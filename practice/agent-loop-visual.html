<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Agent Loop — Lesson 1</title>
<style>
  :root{
    --bg:#14181D; --card:#1E242B; --cardUp:#252C34; --ink:#10141A;
    --naan:#EDE3D0; --steel:#8A94A0; --line:#2A323B;
    --saffron:#F2A33C; --ember:#E4584B; --mint:#5BD9A6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--naan);
    font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
    padding:20px 16px calc(28px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;}
  .kick{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--saffron);}
  h1{font-size:22px;font-weight:900;margin:4px 0 2px;}
  .sub{font-size:12px;color:var(--steel);margin-bottom:16px;}

  /* loop diagram */
  .loop{display:flex;align-items:center;gap:6px;justify-content:center;margin:12px 0 6px;flex-wrap:wrap;}
  .phase{font-size:11px;font-weight:800;padding:6px 10px;border-radius:999px;background:var(--card);
    color:var(--steel);border:1px solid var(--line);transition:all .25s;}
  .phase.on{background:var(--saffron);color:var(--ink);transform:scale(1.06);}
  .arrow{color:var(--steel);font-size:12px;}

  .day{text-align:center;font-size:13px;color:var(--steel);margin:10px 0 4px;}
  .day b{color:var(--naan);font-size:15px;}

  .item{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .item-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .name{font-weight:800;font-size:15px;}
  .badge{font-size:10px;font-weight:900;padding:2px 8px;border-radius:6px;text-transform:uppercase;}
  .bar{position:relative;display:flex;gap:3px;height:16px;}
  .seg{flex:1;border-radius:3px;background:var(--ink);transition:background .3s;}
  .tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--saffron);}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--steel);margin-top:6px;}
  .pending{color:var(--saffron);font-weight:700;}

  .controls{display:flex;gap:8px;margin:14px 0 6px;}
  button{flex:1;border:none;border-radius:12px;padding:14px;font-weight:900;font-size:15px;
    background:var(--saffron);color:var(--ink);active:opacity:.9;}
  button.ghost{background:var(--card);color:var(--naan);border:1px solid var(--line);}
  button:active{transform:scale(.98);}

  .policy{display:flex;gap:8px;background:var(--card);border-radius:12px;padding:4px;margin:6px 0 4px;border:1px solid var(--line);}
  .policy button{background:transparent;color:var(--steel);font-size:12px;padding:9px;border-radius:9px;}
  .policy button.sel{background:var(--naan);color:var(--ink);}
  .hint{font-size:11px;color:var(--steel);text-align:center;margin:6px 2px 0;line-height:1.5;}

  .log{background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:14px;
    font-family:ui-monospace,monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;
    max-height:200px;overflow:auto;color:var(--naan);}
  .log .obs{color:var(--steel);} .log .think{color:var(--saffron);}
  .log .act{color:var(--mint);} .log .stockout{color:var(--ember);font-weight:700;}
</style>
</head>
<body>
  <div class="kick">Lesson 1 · Practice</div>
  <h1>The Agent Loop</h1>
  <div class="sub">Tap “Step 1 day” and watch the agent run <b>Observe → Think → Act</b>, over and over.</div>

  <div class="loop">
    <span class="phase" id="p-obs">OBSERVE</span><span class="arrow">→</span>
    <span class="phase" id="p-think">THINK</span><span class="arrow">→</span>
    <span class="phase" id="p-act">ACT</span><span class="arrow">↻</span>
  </div>

  <div class="policy">
    <button id="pol-naive" class="sel" onclick="setPolicy('naive')">Policy: short-sighted</button>
    <button id="pol-smart" onclick="setPolicy('smart')">Policy: lead-time aware</button>
  </div>
  <div class="hint" id="hint">Short-sighted reorders only <i>at</i> the reorder point — but delivery takes 2 days. Watch it run out.</div>

  <div class="day">Day <b id="day">0</b></div>
  <div id="items"></div>

  <div class="controls">
    <button onclick="step()">▶ Step 1 day</button>
    <button class="ghost" onclick="auto()">⏩ Auto</button>
    <button class="ghost" onclick="reset()">↺ Reset</button>
  </div>

  <div class="log" id="log">Ready. Tap “Step 1 day”.</div>

<script>
const START = {
  salad_clamshell:{stock:8,max:10,reorderAt:4,usePerDay:2,leadTime:2},
  rice_clamshell :{stock:6,max:7, reorderAt:3,usePerDay:1,leadTime:2},
};
let world, policy='naive', timer=null;

function reset(){
  if(timer){clearInterval(timer);timer=null;}
  world={day:0,items:JSON.parse(JSON.stringify(START)),pending:[]};
  document.getElementById('log').textContent='Ready. Tap “Step 1 day”.';
  render(); setDay();
}
function setPolicy(p){
  policy=p;
  document.getElementById('pol-naive').classList.toggle('sel',p==='naive');
  document.getElementById('pol-smart').classList.toggle('sel',p==='smart');
  document.getElementById('hint').innerHTML = p==='naive'
    ? 'Short-sighted reorders only <i>at</i> the reorder point — but delivery takes 2 days. Watch it run out.'
    : 'Lead-time aware reorders <i>early</i> — before it would starve. Trigger = reorderAt + usePerDay × leadTime.';
  reset();
}

// THINK — the policy (the agent's "brain")
function decide(w){
  const actions=[];
  for(const [name,it] of Object.entries(w.items)){
    const incoming=w.pending.filter(p=>p.item===name).reduce((s,p)=>s+p.qty,0);
    const trigger = policy==='smart'
      ? it.reorderAt + it.usePerDay*it.leadTime   // think ahead
      : it.reorderAt;                             // short-sighted
    if(it.stock+incoming<=trigger) actions.push({item:name,qty:it.max-it.stock-incoming});
  }
  return actions;
}
function tick(w){
  w.pending=w.pending.filter(p=>{ if(p.arrivesOnDay===w.day){w.items[p.item].stock+=p.qty;return false;} return true; });
  for(const it of Object.values(w.items)) it.stock=Math.max(0,it.stock-it.usePerDay);
}

function step(){
  world.day++;
  flash('p-obs');
  const obs=Object.entries(world.items).map(([k,v])=>k+'='+v.stock).join('  ');
  setTimeout(()=>flash('p-think'),200);
  const actions=decide(world);
  setTimeout(()=>flash('p-act'),400);
  const acted=actions.map(a=>{ world.pending.push({item:a.item,qty:a.qty,arrivesOnDay:world.day+world.items[a.item].leadTime}); return 'order '+a.qty+' '+a.item; });
  tick(world);
  setDay(); render();
  const out=Object.entries(world.items).map(([k,v])=>k+'='+v.stock).join('  ');
  const starved=Object.entries(world.items).filter(([k,v])=>v.stock===0).map(([k])=>k);
  let line='<b>Day '+world.day+'</b>\n';
  line+='<span class="obs">  observe: '+obs+'</span>\n';
  line+='<span class="think">  think:   '+(actions.length?actions.map(a=>'reorder '+a.item+' x'+a.qty).join('; '):'all above trigger → do nothing')+'</span>\n';
  if(acted.length) line+='<span class="act">  act:     '+acted.join('; ')+'</span>\n';
  line+='  result:  '+out;
  if(starved.length) line+='\n<span class="stockout">  ⚠ STOCKOUT: '+starved.join(', ')+'</span>';
  const log=document.getElementById('log');
  if(world.day===1) log.innerHTML='';
  log.innerHTML+=(log.innerHTML?'\n\n':'')+line;
  log.scrollTop=log.scrollHeight;
  if(world.day>=10 && timer){clearInterval(timer);timer=null;}
}
function auto(){ if(timer){clearInterval(timer);timer=null;return;} timer=setInterval(step,900); }
function flash(id){ const el=document.getElementById(id); el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),260); }
function setDay(){ document.getElementById('day').textContent=world.day; }

function render(){
  const box=document.getElementById('items'); box.innerHTML='';
  for(const [name,it] of Object.entries(world.items)){
    const incoming=world.pending.filter(p=>p.item===name).reduce((s,p)=>s+p.qty,0);
    const status = it.stock===0?'out':it.stock<=it.reorderAt?'low':'ok';
    const col = status==='out'?'var(--ember)':status==='low'?'var(--saffron)':'var(--mint)';
    let segs='';
    for(let i=0;i<it.max;i++) segs+='<div class="seg" style="background:'+(i<it.stock?col:'var(--ink)')+'"></div>';
    const tickPct = (it.reorderAt/it.max)*100;
    box.innerHTML+=
      '<div class="item">'+
      '<div class="item-top"><span class="name">'+name.replace(/_/g," ")+'</span>'+
      '<span class="badge" style="background:'+col+'22;color:'+col+'">'+status+'</span></div>'+
      '<div class="bar">'+segs+'<div class="tick" style="left:'+tickPct+'%"></div></div>'+
      '<div class="meta"><span>on hand: '+it.stock+' / '+it.max+'</span>'+
      (incoming?'<span class="pending">'+incoming+' on the way</span>':'<span>uses '+it.usePerDay+'/day</span>')+'</div>'+
      '</div>';
  }
}
reset();
</script>
</body>
</html>
