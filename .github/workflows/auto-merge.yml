name: Auto-merge phone PRs
on:
  pull_request:
    types: [opened, reopened, synchronize]
permissions:
  contents: write
  pull-requests: write
jobs:
  automerge:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Squash-merge claude PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --repo "$REPO" --squash --delete-branch; then exit 0; fi
            echo "not ready, retrying in 12s..."; sleep 12
          done
          echo "auto-merge failed (likely a conflict) - leaving PR open"; exit 1
