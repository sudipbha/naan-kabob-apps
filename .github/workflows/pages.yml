name: Deploy to GitHub Pages

# Publishes the repo as a static site to GitHub Pages.
# Runs alongside Netlify — it does not touch any Netlify config.
#   /          -> landing page (index.html)
#   /sysco/    -> Sysco tracker
#   /champion/ -> Champion tracker

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Auto-merge merges PRs with GITHUB_TOKEN, which does NOT trigger the push
  # event above. workflow_run fires after the auto-merge workflow finishes,
  # so merged PRs still publish to Pages without a manual run.
  workflow_run:
    workflows: ["Auto-merge phone PRs"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # Pages sometimes rejects a fine artifact with a transient
      # "Deployment failed, try again later" — retry twice before giving up.
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Deploy (retry 1)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before second retry
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 60
      - name: Deploy (retry 2)
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
      # Post-deploy smoke test: the live apps must actually serve the app code.
      - name: Smoke-test live site
        run: |
          for app in sysco champion; do
            for i in 1 2 3; do
              body=$(curl -fsSL "https://sudipbha.github.io/naan-kabob-apps/$app/" || true)
              if echo "$body" | grep -q "ChampionTracker"; then
                echo "$app OK"; continue 2
              fi
              echo "$app not ready yet (attempt $i)"; sleep 20
            done
            echo "SMOKE FAIL: $app did not serve the app"; exit 1
          done
