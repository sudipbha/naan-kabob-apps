# Skip this site's deploy when nothing in the sysco/ folder changed.
# Netlify runs `ignore` from the site's base directory (sysco/); exit 0 = skip build.
# Prefer the last successfully-built commit; on deploy previews with no cached
# build ($CACHED_COMMIT_REF empty) fall back to this commit's parent (HEAD^),
# so a champion-only change doesn't rebuild sysco (and vice versa).
[build]
  ignore = "git diff --quiet ${CACHED_COMMIT_REF:-HEAD^} ${COMMIT_REF:-HEAD} ."
